<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroBlock: Spike Pattern Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #E0E0E0;
        }
        .glass-pane {
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-gradient-text {
            background: -webkit-linear-gradient(45deg, #A855F7, #EC4899, #F59E0B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(90deg, #A855F7, #D946EF);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
        }
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .input-field {
            background-color: #101010;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field:focus {
            outline: none;
            border-color: #A855F7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .pattern-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            background: linear-gradient(145deg, rgba(16, 16, 16, 0.8), rgba(20, 20, 20, 0.7));
        }
        .pattern-card:hover {
            transform: translateY(-5px);
            border-color: #A855F7;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        #root::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 30%),
                              radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 30%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { createClient } = supabase;
        const { ethers } = window;

        // --- ⬇️ CONFIGURATION UPDATED ⬇️ ---
        const SUPABASE_URL = 'https://mqzsqekskkqdjscohcno.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xenNxZWtza2txZGpzY29oY25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjkwNTIsImV4cCI6MjA4ODYwNTA1Mn0.b98WfR2tw1a5y7LY2lrC2F4nGymYvqVPsViCoYQ3HNU';
        
        const CONTRACT_ADDRESS = '0xB7C33742aEa4502F1b330d2F9Ae61873Ee8cDa57';
        // --- ⬆️ CONFIGURATION COMPLETE ⬆️ ---

        const CONTRACT_ABI = [
            "event PatternRegistered(bytes32 indexed patternHash, address indexed registrant, uint256 timestamp)",
            "function registerPattern(bytes32 patternHash)",
            "function doesPatternExist(bytes32 patternHash) view returns (bool)",
            "function getRegistrant(bytes32 patternHash) view returns (address)"
        ];

        let supabaseClient;
        try {
            supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (error) {
            console.error("Error initializing Supabase:", error);
        }

        const { useState, useEffect, useCallback, Fragment } = React;

        // --- Helper & Core Logic Functions ---
        
        const generateSpikePattern = (numNeurons = 10, duration = 100, avgFiringRate = 10) => {
            const spikes = [];
            for (let i = 0; i < numNeurons; i++) {
                const numSpikes = Math.floor(Math.random() * (avgFiringRate * (duration / 1000) * 2));
                for (let j = 0; j < numSpikes; j++) {
                    spikes.push({
                        neuron_id: i,
                        spike_time: parseFloat((Math.random() * duration).toFixed(2)),
                    });
                }
            }
            spikes.sort((a, b) => a.neuron_id - b.neuron_id || a.spike_time - b.spike_time);
            return JSON.stringify(spikes, null, 2);
        };

        const calculateSHA256 = async (data) => {
            const encoder = new TextEncoder();
            const dataBuffer = encoder.encode(data);
            const hashBuffer = await crypto.subtle.digest('SHA-256', dataBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        // --- React Components ---

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isAuthModalOpen, setAuthModalOpen] = useState(false);

            useEffect(() => {
                const checkUser = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    setUser(session?.user ?? null);
                    setLoading(false);

                    const { data: authListener } = supabaseClient.auth.onAuthStateChange(
                        (event, session) => {
                            setUser(session?.user ?? null);
                        }
                    );
                    return () => authListener.subscription.unsubscribe();
                };
                checkUser();
            }, []);

            const renderView = () => {
                switch (view) {
                    case 'register':
                        return <RegisterPattern setView={setView} user={user} openAuthModal={() => setAuthModalOpen(true)} />;
                    case 'library':
                        return <PatternLibrary />;
                    case 'verify':
                        return <VerifyPattern />;
                    default:
                        return <HeroSection setView={setView} />;
                }
            };

            if (loading) {
                return <div className="flex items-center justify-center min-h-screen text-lg">Loading NeuroBlock...</div>;
            }

            return (
                <div className="min-h-screen w-full">
                    <Header setView={setView} user={user} setAuthModalOpen={setAuthModalOpen} />
                    <main className="px-4 sm:px-8 md:px-12 lg:px-24 py-8">
                        {renderView()}
                    </main>
                    {isAuthModalOpen && <AuthModal setAuthModalOpen={setAuthModalOpen} />}
                    <Footer />
                </div>
            );
        }

        function Header({ setView, user, setAuthModalOpen }) {
             return (
                <header className="sticky top-0 z-50 glass-pane">
                    <nav className="container mx-auto px-4 sm:px-8 md:px-12 lg:px-24 py-4 flex justify-between items-center">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
                             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-purple-400"><path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M2 7L12 12L22 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M12 22V12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M22 17L17 14.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M2 17L7 14.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path></svg>
                            <span className="font-bold text-xl text-white">NeuroBlock</span>
                        </div>
                        <div className="hidden md:flex items-center space-x-6">
                            <a href="#" className="text-gray-300 hover:text-white transition" onClick={(e) => { e.preventDefault(); setView('register'); }}>Register</a>
                            <a href="#" className="text-gray-300 hover:text-white transition" onClick={(e) => { e.preventDefault(); setView('library'); }}>Library</a>
                            <a href="#" className="text-gray-300 hover:text-white transition" onClick={(e) => { e.preventDefault(); setView('verify'); }}>Verify</a>
                        </div>
                        <div>
                             {user ? (
                                <div className="flex items-center space-x-4">
                                    <span className="text-sm text-gray-400 hidden sm:block">{user.email.split('@')[0]}</span>
                                    <button
                                        onClick={() => supabaseClient.auth.signOut()}
                                        className="btn-secondary text-white font-semibold py-2 px-4 rounded-lg text-sm"
                                    >
                                        Sign Out
                                    </button>
                                </div>
                            ) : (
                                <button
                                    onClick={() => setAuthModalOpen(true)}
                                    className="btn-primary text-white font-semibold py-2 px-4 rounded-lg text-sm"
                                >
                                    Sign In / Sign Up
                                </button>
                             )}
                        </div>
                    </nav>
                </header>
            );
        }
        
        function AuthModal({ setAuthModalOpen }) {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [message, setMessage] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                setMessage('');
                
                const { error } = isLogin
                    ? await supabaseClient.auth.signInWithPassword({ email, password })
                    : await supabaseClient.auth.signUp({ email, password });

                if (error) {
                    setMessage(error.message);
                } else {
                    if (!isLogin) {
                        setMessage('Success! Check email for verification.');
                    } else {
                         setAuthModalOpen(false);
                    }
                }
                setIsLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                    <div className="glass-pane rounded-2xl p-8 w-full max-w-md relative border border-gray-700">
                        <button onClick={() => setAuthModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white">&times;</button>
                        <h2 className="text-2xl font-bold text-center mb-2 text-white">{isLogin ? 'Sign In' : 'Sign Up'}</h2>
                        <form onSubmit={handleAuth}>
                            <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-3 mb-4 rounded-lg input-field text-white" required />
                            <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 mb-6 rounded-lg input-field text-white" required />
                            <button type="submit" className="w-full btn-primary text-white font-bold py-3 rounded-lg" disabled={isLoading}>
                                {isLoading ? 'Loading...' : (isLogin ? 'Sign In' : 'Sign Up')}
                            </button>
                        </form>
                        {message && <p className={`mt-4 text-center text-sm ${message.includes('Success') ? 'text-green-400' : 'text-red-400'}`}>{message}</p>}
                        <p className="mt-6 text-center text-gray-400 text-sm">
                            {isLogin ? "Don't have an account?" : "Already have an account?"}
                            <a href="#" onClick={(e) => { e.preventDefault(); setIsLogin(!isLogin); }} className="ml-2 font-semibold text-purple-400 hover:text-purple-300">
                                {isLogin ? 'Sign Up' : 'Sign In'}
                            </a>
                        </p>
                    </div>
                </div>
            );
        }


        function HeroSection({ setView }) {
            return (
                <div className="text-center py-20 lg:py-32">
                    <h1 className="text-5xl md:text-7xl font-black mb-4 tracking-tighter hero-gradient-text">
                        NeuroBlock Registry
                    </h1>
                    <p className="max-w-3xl mx-auto text-lg md:text-xl text-gray-300 mb-8">
                        A decentralized registry for Spiking Neural Network patterns. Ensure reproducibility and traceability in neuromorphic AI.
                    </p>
                    <div className="flex justify-center items-center space-x-4">
                        <button onClick={() => setView('register')} className="btn-primary text-white font-bold py-3 px-8 rounded-lg">
                            Get Started
                        </button>
                        <button onClick={() => setView('library')} className="btn-secondary text-white font-bold py-3 px-8 rounded-lg">
                            Explore Library
                        </button>
                    </div>
                </div>
            );
        }

        function RegisterPattern({ setView, user, openAuthModal }) {
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [patternData, setPatternData] = useState('');
            const [patternHash, setPatternHash] = useState('');
            const [message, setMessage] = useState('');
            const [status, setStatus] = useState('initial'); 
            const [isLoading, setIsLoading] = useState(false);
            const [walletAddress, setWalletAddress] = useState(null);
            const [contract, setContract] = useState(null);

            const connectWallet = async () => {
                if (!window.ethereum) {
                    setMessage("MetaMask not detected.");
                    return;
                }
                try {
                    const web3Provider = new ethers.providers.Web3Provider(window.ethereum);
                    await web3Provider.send("eth_requestAccounts", []);
                    const signer = web3Provider.getSigner();
                    const address = await signer.getAddress();
                    setWalletAddress(address);
                    setContract(new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer));
                } catch(err){
                    setMessage("Wallet error: " + err.message);
                }
            };
            
            const handleHash = async () => {
                if (!patternData) return;
                setIsLoading(true);
                const hash = await calculateSHA256(patternData);
                setPatternHash(hash);
                setStatus('generated');
                setIsLoading(false);
            };

            const handleSaveToDB = async () => {
                if (!user) { openAuthModal(); return; }
                setIsLoading(true);
                try {
                    const { error } = await supabaseClient.from('spike_patterns').insert({
                        title,
                        description,
                        pattern_data: JSON.parse(patternData),
                        pattern_hash: patternHash,
                        owner_id: user.id
                    });
                    if (error) throw error;
                    setStatus('saved');
                    setMessage('Saved to registry.');
                } catch (err) {
                    setMessage('Error: ' + err.message);
                }
                setIsLoading(false);
            };
            
            const handleRegisterOnChain = async () => {
                if (!contract) return;
                setIsLoading(true);
                try {
                    const onChainHash = `0x${patternHash}`;
                    const tx = await contract.registerPattern(onChainHash);
                    await tx.wait();
                    await supabaseClient.from('spike_patterns').update({ on_chain: true, tx_hash: tx.hash }).eq('pattern_hash', patternHash);
                    setStatus('registered');
                    setMessage(`On-chain success!`);
                } catch (err) {
                    setMessage(`Error: ${err.message}`);
                }
                setIsLoading(false);
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <h1 className="text-4xl font-bold mb-8">Register Pattern</h1>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="space-y-4">
                            <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full p-3 rounded-lg input-field" placeholder="Title" />
                            <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="w-full p-3 rounded-lg input-field h-24" placeholder="Description"></textarea>
                            <textarea value={patternData} onChange={(e) => setPatternData(e.target.value)} className="w-full p-3 rounded-lg input-field h-48 font-mono text-xs" placeholder='JSON data...'></textarea>
                            <button onClick={() => setPatternData(generateSpikePattern())} className="text-xs text-purple-400">Generate Sample Data</button>
                        </div>
                        <div className="space-y-4">
                            <StepCard number="1" title="Hash" action={handleHash} buttonText="Generate Hash" completed={status !== 'initial'} />
                            <StepCard number="2" title="Registry" action={handleSaveToDB} buttonText="Save to Database" disabled={status === 'initial'} completed={status === 'saved' || status === 'registered'} />
                            <StepCard number="3" title="Blockchain" action={!walletAddress ? connectWallet : handleRegisterOnChain} buttonText={!walletAddress ? "Connect Wallet" : "Register On-Chain"} disabled={status !== 'saved'} completed={status === 'registered'} />
                        </div>
                    </div>
                    {message && <div className="mt-8 p-4 rounded-lg bg-gray-800 text-center">{message}</div>}
                </div>
            );
        }

        const StepCard = ({ number, title, action, buttonText, disabled, completed }) => (
            <div className={`p-5 rounded-lg border ${completed ? 'border-green-500/50 bg-green-500/10' : 'border-gray-700 bg-gray-800/50'}`}>
                <div className="flex items-center mb-3">
                    <span className={`w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold ${completed ? 'bg-green-500' : 'bg-purple-500'}`}>{number}</span>
                    <h3 className="ml-3 font-bold">{title}</h3>
                </div>
                <button onClick={action} disabled={disabled} className="w-full py-2 rounded-lg bg-white/10 text-xs hover:bg-white/20 disabled:opacity-30">
                    {buttonText}
                </button>
            </div>
        );

        function PatternLibrary() {
            const [patterns, setPatterns] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchPatterns = async () => {
                    const { data } = await supabaseClient.from('spike_patterns').select('*').order('created_at', { ascending: false });
                    setPatterns(data || []);
                    setLoading(false);
                };
                fetchPatterns();
            }, []);

            if (loading) return <div>Loading...</div>;

            return (
                 <div>
                    <h1 className="text-4xl font-bold mb-8">Pattern Library</h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {patterns.map(p => (
                            <div key={p.id} className="pattern-card p-6 rounded-xl">
                                <h3 className="font-bold mb-2">{p.title}</h3>
                                <p className="text-xs text-gray-500 mb-4">{p.pattern_hash.substring(0,20)}...</p>
                                <span className={`text-xs p-1 rounded ${p.on_chain ? 'bg-green-900 text-green-300' : 'bg-gray-800'}`}>
                                    {p.on_chain ? 'On-Chain Verified' : 'Registered'}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function VerifyPattern() {
            const [patternToVerify, setPatternToVerify] = useState('');
            const [result, setResult] = useState(null);
            
            const handleVerification = async () => {
                const hash = await calculateSHA256(patternToVerify);
                const { data } = await supabaseClient.from('spike_patterns').select('*').eq('pattern_hash', hash).single();
                setResult(data ? { ...data, found: true } : { found: false });
            };

            return (
                <div className="max-w-2xl mx-auto text-center">
                    <h1 className="text-4xl font-bold mb-8">Verify Pattern</h1>
                    <textarea value={patternToVerify} onChange={(e) => setPatternToVerify(e.target.value)} className="w-full p-4 rounded-lg input-field h-48 mb-4 font-mono text-xs" placeholder="Paste JSON here..."></textarea>
                    <button onClick={handleVerification} className="btn-primary py-3 px-8 rounded-lg w-full">Verify</button>
                    {result && (
                        <div className="mt-8 p-6 rounded-lg border border-white/10">
                            {result.found ? `Verified: ${result.title}` : "Pattern not found in registry."}
                        </div>
                    )}
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="text-center py-8 mt-16 border-t border-gray-800 text-gray-600 text-sm">
                    &copy; {new Date().getFullYear()} NeuroBlock by Yajushi Vudatha
                </footer>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
