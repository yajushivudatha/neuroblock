<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroBlock: Spike Pattern Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #E0E0E0;
        }
        .glass-pane {
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-gradient-text {
            background: -webkit-linear-gradient(45deg, #A855F7, #EC4899, #F59E0B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(90deg, #A855F7, #D946EF);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
        }
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .input-field {
            background-color: #101010;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field:focus {
            outline: none;
            border-color: #A855F7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .pattern-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            background: linear-gradient(145deg, rgba(16, 16, 16, 0.8), rgba(20, 20, 20, 0.7));
        }
        .pattern-card:hover {
            transform: translateY(-5px);
            border-color: #A855F7;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        #root::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 30%),
                              radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 30%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { createClient } = supabase;
        const { ethers } = window;

        // --- ⬇️ CONFIGURATION REQUIRED ⬇️ ---
        // 1. Go to your Supabase project > Settings > API
        const SUPABASE_URL = 'https://mqzsqekskkqdjscohcno.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xenNxZWtza2txZGpzY29oY25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjkwNTIsImV4cCI6MjA4ODYwNTA1Mn0.b98WfR2tw1a5y7LY2lrC2F4nGymYvqVPsViCoYQ3HNU';
        
        // 2. Deploy the Solidity contract (provided below) to a testnet (e.g., Sepolia)
        //    and paste the deployed contract address here.
        const CONTRACT_ADDRESS = '0x0fD7fC464AF767B6855564D1A4BA7Ddb905d439F';
        // --- ⬆️ CONFIGURATION COMPLETE ⬆️ ---

        // The Solidity smart contract is stored in a template literal to prevent Babel parsing errors.
        const solidityCode = `
        /* * SOLIDITY SMART CONTRACT: NeuroBlockRegistry.sol
         * -------------------------------------------------
         * This code should be deployed using Remix IDE (https://remix.ethereum.org/)
         
        // SPDX-License-Identifier: MIT
        pragma solidity ^0.8.20;

        /**
         * @title NeuroBlockRegistry
         * @author NeuroBlock Developers
         * @notice A decentralized registry for Spiking Neural Network (SNN) pattern hashes.
         * @custom:dev-run-script scripts/deploy.js
         */
        contract NeuroBlockRegistry {
            event PatternRegistered(bytes32 indexed patternHash, address indexed registrant, uint256 timestamp);

            mapping(bytes32 => bool) private _patternExists;
            mapping(bytes32 => address) private _registrant;
            
            /**
             * @notice Registers a new SNN pattern hash on the blockchain.
             * @dev Reverts if the hash has already been registered.
             * @param patternHash The SHA-256 hash of the SNN pattern data.
             */
            function registerPattern(bytes32 patternHash) public {
                require(!_patternExists[patternHash], "Pattern hash already registered.");
                
                _patternExists[patternHash] = true;
                _registrant[patternHash] = msg.sender;
                
                emit PatternRegistered(patternHash, msg.sender, block.timestamp);
            }

            /**
             * @notice Checks if a pattern hash has been registered.
             * @param patternHash The hash to check.
             * @return bool True if the pattern exists, false otherwise.
             */
            function doesPatternExist(bytes32 patternHash) public view returns (bool) {
                return _patternExists[patternHash];
            }

            /**
             * @notice Retrieves the address of the original registrant for a given hash.
             * @param patternHash The hash to look up.
             * @return address The address of the registrant. Returns the zero address if not found.
             */
            function getRegistrant(bytes32 patternHash) public view returns (address) {
                return _registrant[patternHash];
            }
        }
        */`;

        const CONTRACT_ABI = [
            "event PatternRegistered(bytes32 indexed patternHash, address indexed registrant, uint256 timestamp)",
            "function registerPattern(bytes32 patternHash)",
            "function doesPatternExist(bytes32 patternHash) view returns (bool)",
            "function getRegistrant(bytes32 patternHash) view returns (address)"
        ];

        let supabaseClient;
        try {
            if (SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                 console.warn("Supabase not fully configured. Database features will be disabled.");
            }
        } catch (error) {
            console.error("Error initializing Supabase:", error);
        }

        const { useState, useEffect, useCallback, Fragment } = React;

        // --- Helper & Core Logic Functions ---
        
        const generateSpikePattern = (numNeurons = 10, duration = 100, avgFiringRate = 10) => {
            const spikes = [];
            for (let i = 0; i < numNeurons; i++) {
                const numSpikes = Math.floor(Math.random() * (avgFiringRate * (duration / 1000) * 2));
                for (let j = 0; j < numSpikes; j++) {
                    spikes.push({
                        neuron_id: i,
                        spike_time: parseFloat((Math.random() * duration).toFixed(2)),
                    });
                }
            }
            spikes.sort((a, b) => a.neuron_id - b.neuron_id || a.spike_time - b.spike_time);
            return JSON.stringify(spikes, null, 2);
        };

        const calculateSHA256 = async (data) => {
            const encoder = new TextEncoder();
            const dataBuffer = encoder.encode(data);
            const hashBuffer = await crypto.subtle.digest('SHA-256', dataBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        // --- React Components ---

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isAuthModalOpen, setAuthModalOpen] = useState(false);

            useEffect(() => {
                if (!supabaseClient) {
                    setLoading(false);
                    return;
                }
                const checkUser = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    setUser(session?.user ?? null);
                    setLoading(false);

                    const { data: authListener } = supabaseClient.auth.onAuthStateChange(
                        (event, session) => {
                            setUser(session?.user ?? null);
                        }
                    );
                    return () => authListener.subscription.unsubscribe();
                };
                checkUser();
            }, []);

            const renderView = () => {
                switch (view) {
                    case 'register':
                        return <RegisterPattern setView={setView} user={user} openAuthModal={() => setAuthModalOpen(true)} />;
                    case 'library':
                        return <PatternLibrary />;
                    case 'verify':
                        return <VerifyPattern />;
                    default:
                        return <HeroSection setView={setView} />;
                }
            };

            if (loading) {
                return <div className="flex items-center justify-center min-h-screen text-lg">Loading NeuroBlock...</div>;
            }

            return (
                <div className="min-h-screen w-full">
                    <Header setView={setView} user={user} setAuthModalOpen={setAuthModalOpen} />
                    <main className="px-4 sm:px-8 md:px-12 lg:px-24 py-8">
                        {renderView()}
                    </main>
                    {isAuthModalOpen && <AuthModal setAuthModalOpen={setAuthModalOpen} />}
                    <Footer />
                </div>
            );
        }

        function Header({ setView, user, setAuthModalOpen }) {
             return (
                <header className="sticky top-0 z-50 glass-pane">
                    <nav className="container mx-auto px-4 sm:px-8 md:px-12 lg:px-24 py-4 flex justify-between items-center">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
                             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-purple-400"><path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M2 7L12 12L22 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M12 22V12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M22 17L17 14.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path><path d="M2 17L7 14.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path></svg>
                            <span className="font-bold text-xl text-white">NeuroBlock</span>
                        </div>
                        <div className="hidden md:flex items-center space-x-6">
                            <a href="#" className="text-gray-300 hover:text-white transition" onClick={(e) => { e.preventDefault(); setView('register'); }}>Register</a>
                            <a href="#" className="text-gray-300 hover:text-white transition" onClick={(e) => { e.preventDefault(); setView('library'); }}>Library</a>
                            <a href="#" className="text-gray-300 hover:text-white transition" onClick={(e) => { e.preventDefault(); setView('verify'); }}>Verify</a>
                        </div>
                        <div>
                             {user ? (
                                <div className="flex items-center space-x-4">
                                    <span className="text-sm text-gray-400 hidden sm:block">{user.email.split('@')[0]}</span>
                                    <button
                                        onClick={() => supabaseClient.auth.signOut()}
                                        className="btn-secondary text-white font-semibold py-2 px-4 rounded-lg text-sm"
                                    >
                                        Sign Out
                                    </button>
                                </div>
                            ) : (
                                <button
                                    onClick={() => setAuthModalOpen(true)}
                                    className="btn-primary text-white font-semibold py-2 px-4 rounded-lg text-sm"
                                >
                                    Sign In / Sign Up
                                </button>
                             )}
                        </div>
                    </nav>
                </header>
            );
        }
        
        function AuthModal({ setAuthModalOpen }) {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [message, setMessage] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                if (!supabaseClient) {
                    setMessage("Supabase is not configured. Cannot authenticate.");
                    return;
                }
                setIsLoading(true);
                setMessage('');
                
                const { error } = isLogin
                    ? await supabaseClient.auth.signInWithPassword({ email, password })
                    : await supabaseClient.auth.signUp({ email, password });

                if (error) {
                    setMessage(error.message);
                } else {
                    if (!isLogin) {
                        setMessage('Success! Please check your email to verify your account.');
                    } else {
                         setAuthModalOpen(false);
                    }
                }
                setIsLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                    <div className="glass-pane rounded-2xl p-8 w-full max-w-md relative border border-gray-700">
                        <button onClick={() => setAuthModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white">&times;</button>
                        <h2 className="text-2xl font-bold text-center mb-2 text-white">{isLogin ? 'Sign In' : 'Sign Up'}</h2>
                        <p className="text-center text-gray-400 mb-6">to the NeuroBlock Platform</p>
                        <form onSubmit={handleAuth}>
                            <input
                                type="email"
                                placeholder="Email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                className="w-full p-3 mb-4 rounded-lg input-field text-white"
                                required
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                className="w-full p-3 mb-6 rounded-lg input-field text-white"
                                required
                            />
                            <button type="submit" className="w-full btn-primary text-white font-bold py-3 rounded-lg" disabled={isLoading}>
                                {isLoading ? 'Loading...' : (isLogin ? 'Sign In' : 'Sign Up')}
                            </button>
                        </form>
                        {message && <p className={`mt-4 text-center text-sm ${message.includes('Success') ? 'text-green-400' : 'text-red-400'}`}>{message}</p>}
                        <p className="mt-6 text-center text-gray-400">
                            {isLogin ? "Don't have an account?" : "Already have an account?"}
                            <a href="#" onClick={(e) => { e.preventDefault(); setIsLogin(!isLogin); }} className="ml-2 font-semibold text-purple-400 hover:text-purple-300">
                                {isLogin ? 'Sign Up' : 'Sign In'}
                            </a>
                        </p>
                    </div>
                </div>
            );
        }


        function HeroSection({ setView }) {
            return (
                <div className="text-center py-20 lg:py-32">
                    <h1 className="text-5xl md:text-7xl font-black mb-4 tracking-tighter hero-gradient-text">
                        NeuroBlock Registry
                    </h1>
                    <p className="max-w-3xl mx-auto text-lg md:text-xl text-gray-300 mb-8">
                        A decentralized, tamper-proof registry for Spiking Neural Network patterns. Ensure reproducibility, traceability, and authenticity in your neuromorphic AI experiments.
                    </p>
                    <div className="flex justify-center items-center space-x-4">
                        <button onClick={() => setView('register')} className="btn-primary text-white font-bold py-3 px-8 rounded-lg">
                            Get Started
                        </button>
                        <button onClick={() => setView('library')} className="btn-secondary text-white font-bold py-3 px-8 rounded-lg">
                            Explore Library
                        </button>
                    </div>
                </div>
            );
        }

        function RegisterPattern({ setView, user, openAuthModal }) {
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [patternData, setPatternData] = useState('');
            const [patternHash, setPatternHash] = useState('');
            const [message, setMessage] = useState('');
            const [status, setStatus] = useState(''); // 'initial', 'generated', 'saved', 'registered'
            const [isLoading, setIsLoading] = useState(false);
            
            const [walletAddress, setWalletAddress] = useState(null);
            const [provider, setProvider] = useState(null);
            const [contract, setContract] = useState(null);

            const connectWallet = async () => {
                // A more robust check for MetaMask
                const getEthereum = () => {
                    if (typeof window.ethereum !== 'undefined') {
                        return window.ethereum;
                    }
                    return null;
                };

                let ethereum = getEthereum();

                if (!ethereum) {
                    // Wait a brief moment to see if the wallet injects itself
                    await new Promise(resolve => setTimeout(resolve, 500));
                    ethereum = getEthereum();
                }

                if(!ethereum){
                    setMessage("MetaMask not detected. Please try these steps: 1) Refresh the page. 2) Ensure your MetaMask wallet is unlocked. 3) Check browser extension settings to grant this site access.");
                    return;
                }
                
                try {
                    const web3Provider = new ethers.providers.Web3Provider(ethereum);
                    await web3Provider.send("eth_requestAccounts", []);
                    const signer = web3Provider.getSigner();
                    const address = await signer.getAddress();
                    const neuroBlockContract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

                    setProvider(web3Provider);
                    setWalletAddress(address);
                    setContract(neuroBlockContract);
                    setMessage(''); // Clear previous messages on success
                } catch(err){
                    setMessage("Failed to connect wallet: " + err.message);
                }
            };
            
            const handleGenerate = () => {
                setPatternData(generateSpikePattern());
            };

            const handleHash = async () => {
                if (!patternData) {
                    setMessage('Please generate or provide pattern data first.');
                    return;
                }
                setIsLoading(true);
                setMessage('');
                try {
                    const hash = await calculateSHA256(patternData);
                    setPatternHash(hash);
                    setStatus('generated');
                    setMessage('Hash generated successfully. You can now save it to the database.');
                } catch (err) {
                    setMessage('Error generating hash: ' + err.message);
                }
                setIsLoading(false);
            };

            const handleSaveToDB = async () => {
                if (!user) {
                    openAuthModal();
                    return;
                }
                if (!title || !patternHash) {
                    setMessage('Title and pattern hash are required.');
                    return;
                }
                if (!supabaseClient) {
                    setMessage("Supabase is not configured. Cannot save.");
                    return;
                }

                setIsLoading(true);
                setMessage('');

                let parsedData;
                try {
                    parsedData = JSON.parse(patternData);
                } catch (e) {
                    setMessage('Error: The pattern data is not valid JSON. Please check the format.');
                    setIsLoading(false);
                    return;
                }

                try {
                    const { error } = await supabaseClient.from('spike_patterns').insert({
                        title,
                        description,
                        pattern_data: parsedData,
                        pattern_hash: patternHash,
                        owner_id: user.id
                    });
                    if (error) throw error;
                    setStatus('saved');
                    setMessage('Pattern saved to database successfully. You can now register the hash on-chain.');
                } catch (err) {
                     console.error("Supabase Error:", err);
                     if (err.code === 'PGRST204' && err.message.includes('owner_id')) {
                        setMessage("Database Setup Error: The 'owner_id' column is missing. Please run the following SQL in your Supabase SQL Editor: ALTER TABLE public.spike_patterns ADD COLUMN owner_id UUID REFERENCES auth.users(id);");
                     } else if (err.code === 'PGRST204' && err.message.includes('pattern_hash')) {
                        setMessage("Database Setup Error: The 'pattern_hash' column is missing. Please run the following SQL in your Supabase SQL Editor: ALTER TABLE public.spike_patterns ADD COLUMN pattern_hash TEXT NOT NULL UNIQUE;");
                     } else if(err.code === '23505') { // unique constraint violation
                        setMessage('Error: This pattern hash already exists in the database.');
                    } else {
                        setMessage('Error saving to database: ' + err.message);
                    }
                }
                setIsLoading(false);
            };
            
            const handleRegisterOnChain = async () => {
                if (!contract) {
                    setMessage("Please connect your wallet first.");
                    return;
                }
                if (status !== 'saved' && status !== 'registered') {
                    setMessage("Please save the pattern to the database before registering on-chain.");
                    return;
                }

                setIsLoading(true);
                setMessage("Please confirm the transaction in your wallet...");
                
                try {
                    const onChainHash = `0x${patternHash}`;
                    const exists = await contract.doesPatternExist(onChainHash);
                    if(exists){
                        setMessage("This hash is already registered on the blockchain.");
                        setIsLoading(false);
                        return;
                    }

                    const tx = await contract.registerPattern(onChainHash);
                    setMessage("Transaction sent. Waiting for confirmation...");
                    await tx.wait();
                    
                    // Update the Supabase record with on-chain status
                    if(supabaseClient) {
                        await supabaseClient
                            .from('spike_patterns')
                            .update({ on_chain: true, tx_hash: tx.hash })
                            .eq('pattern_hash', patternHash);
                    }
                    
                    setStatus('registered');
                    setMessage(`Success! Pattern registered on-chain. TxHash: ${tx.hash}`);

                } catch (err) {
                    setMessage(`Error registering on-chain: ${err.data ? err.data.message : err.message}`);
                }
                setIsLoading(false);
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <h1 className="text-4xl font-bold mb-2">Register a New Spike Pattern</h1>
                    <p className="text-gray-400 mb-8">Follow the steps below to secure your SNN data.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Left Side: Form */}
                        <div className="space-y-4">
                             <div>
                                <label className="block mb-2 font-medium">Pattern Title</label>
                                <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full p-3 rounded-lg input-field" placeholder="e.g., Auditory Cortex Response" />
                            </div>
                            <div>
                                <label className="block mb-2 font-medium">Description (Optional)</label>
                                <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="w-full p-3 rounded-lg input-field h-24" placeholder="Details about the experiment or data source"></textarea>
                            </div>
                            <div>
                                <div className="flex justify-between items-center mb-2">
                                    <label className="font-medium">Spike Pattern Data (JSON)</label>
                                    <button onClick={handleGenerate} className="text-sm text-purple-400 hover:text-purple-300 font-semibold">Generate Simulated Data</button>
                                </div>
                                <textarea value={patternData} onChange={(e) => setPatternData(e.target.value)} className="w-full p-3 rounded-lg input-field h-48 font-mono text-xs" placeholder='[{"neuron_id": 0, "spike_time": 10.2}, ...]'></textarea>
                            </div>
                        </div>

                        {/* Right Side: Steps */}
                        <div className="space-y-4">
                            <StepCard 
                                number="1" 
                                title="Generate & Hash Pattern"
                                description="Create a unique digital fingerprint (SHA-256 hash) for your pattern data."
                                action={handleHash}
                                buttonText={isLoading && !patternHash ? 'Hashing...' : 'Generate Hash'}
                                disabled={!patternData || isLoading}
                                completed={status === 'generated' || status === 'saved' || status === 'registered'}
                            />
                             <StepCard 
                                number="2" 
                                title="Save to Registry"
                                description="Log the hash and metadata to the secure, off-chain Supabase registry."
                                action={handleSaveToDB}
                                buttonText={isLoading && status === 'generated' ? 'Saving...' : 'Save to Database'}
                                disabled={status !== 'generated' || isLoading}
                                completed={status === 'saved' || status === 'registered'}
                                requiresAuth={true}
                                user={user}
                            />
                             <StepCard 
                                number="3" 
                                title="Register On-Chain"
                                description="Anchor the hash on the blockchain for permanent, immutable proof."
                                action={handleRegisterOnChain}
                                buttonText={walletAddress ? (isLoading && status==='saved' ? 'Registering...' : 'Register Hash On-Chain') : 'Connect Wallet'}
                                preAction={!walletAddress ? connectWallet : null}
                                disabled={status !== 'saved' || isLoading}
                                completed={status === 'registered'}
                            />
                        </div>
                    </div>

                    {message && <div className="mt-8 text-center p-4 rounded-lg bg-gray-800 border border-gray-700">{message}</div>}
                    {patternHash && (
                        <div className="mt-8 p-4 rounded-lg bg-gray-900 border border-gray-700">
                             <h3 className="font-bold mb-2">Generated SHA-256 Hash:</h3>
                             <p className="font-mono text-sm text-purple-300 break-all">{patternHash}</p>
                        </div>
                    )}
                </div>
            );
        }

        const StepCard = ({ number, title, description, action, buttonText, disabled, completed, requiresAuth, user, preAction }) => (
            <div className={`p-5 rounded-lg border ${completed ? 'border-green-500/50 bg-green-500/10' : 'border-gray-700 bg-gray-800/50'}`}>
                <div className="flex items-center mb-3">
                    <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-lg ${completed ? 'bg-green-500 text-black' : 'bg-purple-500 text-white'}`}>{number}</span>
                    <h3 className="ml-4 font-bold text-xl">{title}</h3>
                </div>
                <p className="text-gray-400 mb-4 text-sm">{description} {requiresAuth && !user && '(Requires Sign-In)'}</p>
                <button onClick={preAction || action} disabled={disabled} className={`w-full py-2 px-4 rounded-lg font-semibold text-sm transition ${disabled ? 'bg-gray-600 text-gray-400 cursor-not-allowed' : 'btn-secondary hover:bg-gray-700 text-white'}`}>
                    {buttonText}
                </button>
            </div>
        );


        function PatternLibrary() {
            const [patterns, setPatterns] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchPatterns = async () => {
                    if (!supabaseClient) {
                         setError("Supabase not configured. Cannot fetch library.");
                         setLoading(false);
                         return;
                    }
                    try {
                        const { data, error } = await supabaseClient
                            .from('spike_patterns')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        setPatterns(data);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchPatterns();
            }, []);

            if (loading) return <div>Loading library...</div>;
            if (error) return <div className="text-red-400">Error: {error}</div>;

            return (
                 <div>
                    <h1 className="text-4xl font-bold mb-2">Pattern Library</h1>
                    <p className="text-gray-400 mb-8">Explore a public collection of registered SNN spike patterns.</p>
                    {patterns.length === 0 ? (
                        <p>No patterns have been registered yet.</p>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {patterns.map(pattern => (
                                <div key={pattern.id} className="pattern-card p-6 rounded-xl flex flex-col">
                                    <h3 className="font-bold text-xl mb-2 text-white">{pattern.title}</h3>
                                    <p className="text-gray-400 text-sm mb-4 flex-grow">{pattern.description || 'No description provided.'}</p>
                                    <div className="text-xs space-y-2 mt-auto">
                                        <p className="font-mono text-gray-500 break-all">
                                            <span className="font-semibold text-gray-400">Hash:</span> {pattern.pattern_hash.substring(0,20)}...
                                        </p>
                                        <p className="font-mono text-gray-500">
                                            <span className="font-semibold text-gray-400">Owner:</span> {pattern.owner_id.substring(0,20)}...
                                        </p>
                                         <p className="font-semibold text-sm">
                                            Status: {pattern.on_chain ? 
                                                <span className="text-green-400">On-Chain</span> : 
                                                <span className="text-yellow-400">Off-Chain</span>
                                            }
                                        </p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function VerifyPattern() {
            const [patternToVerify, setPatternToVerify] = useState('');
            const [hashToVerify, setHashToVerify] = useState('');
            const [verificationResult, setVerificationResult] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            
            const handleVerification = async () => {
                if (!patternToVerify) {
                    setVerificationResult({ status: 'error', message: 'Please provide pattern data to verify.' });
                    return;
                }
                
                setIsLoading(true);
                setVerificationResult(null);
                
                try {
                    const calculatedHash = await calculateSHA256(patternToVerify);
                    setHashToVerify(calculatedHash);
                    
                    let dbResult = null;
                    if (supabaseClient) {
                         const { data, error } = await supabaseClient
                            .from('spike_patterns')
                            .select('*')
                            .eq('pattern_hash', calculatedHash)
                            .single();
                        if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows found
                        dbResult = data;
                    }

                    let verificationProvider;
                    // Prefer MetaMask provider if available for a more stable connection
                    if (window.ethereum) {
                        verificationProvider = new ethers.providers.Web3Provider(window.ethereum);
                    } else {
                        // Fallback to a public RPC if MetaMask is not available
                        verificationProvider = new ethers.providers.JsonRpcProvider(`https://sepolia.infura.io/v3/9aa3d95b3bc440fa88ea12eaa4456161`);
                    }

                    const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, verificationProvider);
                    const onChainExists = await contract.doesPatternExist(`0x${calculatedHash}`);

                    if (onChainExists) {
                         setVerificationResult({
                            status: 'success',
                            message: 'This pattern is verified and registered on the blockchain.',
                            data: dbResult,
                            onChain: true,
                         });
                    } else if(dbResult) {
                         setVerificationResult({
                            status: 'warning',
                            message: 'This pattern exists in the off-chain database but is not yet registered on-chain.',
                            data: dbResult,
                            onChain: false,
                         });
                    } else {
                         setVerificationResult({
                            status: 'error',
                            message: 'This pattern does not exist in the registry.',
                         });
                    }

                } catch (err) {
                    let userMessage = 'Verification failed: ' + err.message;
                    if (err.code === 'NETWORK_ERROR') {
                        userMessage = 'Could not connect to the blockchain network. Please check your internet connection and disable any ad-blockers or VPNs, then refresh the page and try again.';
                    }
                    setVerificationResult({ status: 'error', message: userMessage });
                }
                
                setIsLoading(false);
            };

            return (
                <div className="max-w-3xl mx-auto">
                    <h1 className="text-4xl font-bold mb-2 text-center">Verify a Spike Pattern</h1>
                    <p className="text-gray-400 mb-8 text-center">Check if a pattern's data fingerprint exists in our registry.</p>
                    
                    <textarea 
                        value={patternToVerify}
                        onChange={(e) => setPatternToVerify(e.target.value)}
                        className="w-full p-4 rounded-lg input-field h-48 font-mono text-xs"
                        placeholder="Paste spike pattern JSON data here to verify its authenticity..."
                    />
                    <button 
                        onClick={handleVerification} 
                        className="w-full mt-4 btn-primary text-white font-bold py-3 rounded-lg"
                        disabled={isLoading}
                    >
                        {isLoading ? 'Verifying...' : 'Verify Pattern'}
                    </button>
                    
                    {verificationResult && (
                        <div className={`mt-8 p-6 rounded-lg border ${
                            verificationResult.status === 'success' ? 'border-green-500/50 bg-green-500/10' :
                            verificationResult.status === 'warning' ? 'border-yellow-500/50 bg-yellow-500/10' :
                            'border-red-500/50 bg-red-500/10'
                        }`}>
                            <h3 className={`font-bold text-xl mb-2 ${
                                verificationResult.status === 'success' ? 'text-green-300' :
                                verificationResult.status === 'warning' ? 'text-yellow-300' :
                                'text-red-300'
                            }`}>
                                { verificationResult.status === 'success' ? 'Verification Successful' : 
                                  verificationResult.status === 'warning' ? 'Verification Partial' : 'Verification Failed'
                                }
                            </h3>
                            <p className="mb-4">{verificationResult.message}</p>
                            <div className="font-mono text-xs text-gray-400 break-all">
                                <strong>Calculated Hash:</strong> {hashToVerify}
                            </div>
                            {verificationResult.data && (
                                <div className="mt-4 pt-4 border-t border-gray-700">
                                    <h4 className="font-bold mb-2">Registered Details:</h4>
                                    <p><strong>Title:</strong> {verificationResult.data.title}</p>
                                    <p><strong>Registered on:</strong> {new Date(verificationResult.data.created_at).toLocaleString()}</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }


        function Footer() {
            return (
                <footer className="text-center py-8 mt-16 border-t border-gray-800">
                    <p className="text-gray-500">&copy; {new Date().getFullYear()} NeuroBlock. A decentralized solution for reproducible AI by Yajushi Vudatha</p>
                </footer>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
